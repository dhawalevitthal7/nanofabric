services:
  metadata:
    build: .
    container_name: metadata
    command: python -m metadata.main
    ports:
      - "9000:9000"
    environment:
      METADATA_PORT: "9000"
      METADATA_DB_PATH: /data/metadata.db
    volumes:
      - metadata_data:/data
    networks:
      - nanofabric

  node1:
    build: .
    container_name: node1
    command: python -m node.main
    ports:
      - "8001:8001"
    environment:
      NODE_ID: node1
      NODE_PORT: "8001"
      NODE_ADDRESS: node1:8001
      METADATA_URL: http://metadata:9000
      DATA_DIR: /data
    volumes:
      - node1_data:/data
    depends_on:
      - metadata
    networks:
      - nanofabric

  node2:
    build: .
    container_name: node2
    command: python -m node.main
    ports:
      - "8002:8002"
    environment:
      NODE_ID: node2
      NODE_PORT: "8002"
      NODE_ADDRESS: node2:8002
      METADATA_URL: http://metadata:9000
      DATA_DIR: /data
    volumes:
      - node2_data:/data
    depends_on:
      - metadata
    networks:
      - nanofabric

  node3:
    build: .
    container_name: node3
    command: python -m node.main
    ports:
      - "8003:8003"
    environment:
      NODE_ID: node3
      NODE_PORT: "8003"
      NODE_ADDRESS: node3:8003
      METADATA_URL: http://metadata:9000
      DATA_DIR: /data
    volumes:
      - node3_data:/data
    depends_on:
      - metadata
    networks:
      - nanofabric

networks:
  nanofabric:
    driver: bridge

volumes:
  metadata_data:
  node1_data:
  node2_data:
  node3_data:
